# CI: test and build on push/PR. Sized for a small Go desktop app.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache-dependency-path: go.sum

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev libwayland-dev libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libxxf86vm-dev

      - name: Run tests
        run: go test -v ./...

      - name: Build binary
        run: go build -o goudev ./cmd/goudev

      - name: Build AppImage
        run: |
          mkdir -p appimage-build/AppDir/usr/bin
          curl -sL -o appimagetool.AppImage \
            'https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage'
          chmod +x appimagetool.AppImage
          cp goudev appimage-build/AppDir/usr/bin/
          cp packaging/appimage/AppRun appimage-build/AppDir/
          cp packaging/appimage/goudev.desktop appimage-build/AppDir/
          chmod +x appimage-build/AppDir/AppRun
          mkdir -p appimage-build/AppDir/usr/share/applications
          cp packaging/appimage/goudev.desktop appimage-build/AppDir/usr/share/applications/
          # Set a dummy version for the AppImage
          ./appimagetool.AppImage --appimage-extract-and-run appimage-build/AppDir "goudev-ci-x86_64.AppImage"

      - name: Upload AppImage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: goudev-appimage
          path: goudev-ci-x86_64.AppImage

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache-dependency-path: go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          args: --timeout=3m
